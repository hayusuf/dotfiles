env:
  TERM: alacritty

window:
  dimensions:
    columns: 0
    lines: 0
  padding:
    x: 5
    y: 5
  decorations: none
  title: al
  dynamic_title: false
  class:
    instance: Alacritty
    general: Alacritty
  gtk_theme_variant: None

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: 3270Medium Nerd Font Mono 
    style: Medium 
  bold:
    family: 3270Medium Nerd Font Mono 
    style: Bold 
  italic:
    family: 3270Medium Nerd Font Mono 
    style: Italic
  bold_italic:
    family: 3270Medium Nerd Font Mono
    style: Oblique
  size: 10.0
 # offset:
    #x: 0
    #y: 0
 # glyph_offset:
   # x: 0
   # y: 0


# If `true`, bold text is drawn using the bright color variants.
draw_bold_text_with_bright_colors: true

# Colors (Tomorrow Night)
colors:
  # Default colors
  primary:
    background: '#1d1f21'
    foreground: '#c5c8c6'
    dim_foreground: '#828482'
    bright_foreground: '#eaeaea'
  cursor:
    text: CellBackground
    cursor: CellForeground
  vi_mode_cursor:
    text: CellBackground
    cursor: CellForeground
  selection:
    text: CellBackground
    background: CellForeground
  search:
    matches:
      foreground: '#000000'
      background: '#ffffff'
    bar:
      background: '#c5c8c6'
      foreground: '#1d1f21'
  normal:
    black:   '#1d1f21'
    red:     '#cc6666'
    green:   '#b5bd68'
    yellow:  '#f0c674'
    blue:    '#81a2be'
    magenta: '#b294bb'
    cyan:    '#8abeb7'
    white:   '#c5c8c6'
  bright:
    black:   '#666666'
    red:     '#d54e53'
    green:   '#b9ca4a'
    yellow:  '#e7c547'
    blue:    '#7aa6da'
    magenta: '#c397d8'
    cyan:    '#70c0b1'
    white:   '#eaeaea'
  dim:
    black:   '#131415'
    red:     '#864343'
    green:   '#777c44'
    yellow:  '#9e824c'
    blue:    '#556a7d'
    magenta: '#75617b'
    cyan:    '#5b7d78'
    white:   '#828482'
  background_opacity: 0.5
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: false
cursor:
  # Values for `style`:  - ▇ Block - _ Underline - | Beam
  style: Beam
  unfocused_hollow: true
  # from `0.0` to `1.0`.
  thickness: 0.15
live_config_reload: true
shell:
  program: /bin/bash
  args:
    - --login
working_directory: None
mouse:
  url:
    launcher:
      program: xdg-open
mouse_bindings:
  - { mouse: Middle, action: PasteSelection }
key_bindings:
  - { key: PageUp,    mods: Shift,   mode: ~Alt, action: ScrollPageUp,  }
  - { key: PageDown,  mods: Shift,   mode: ~Alt, action: ScrollPageDown }
  - { key: Home,      mods: Shift,   mode: ~Alt, action: ScrollToTop,   }
  - { key: End,       mods: Shift,   mode: ~Alt, action: ScrollToBottom }
  - { key: V,        mods: Control,           action: Paste            }
  - { key: C,        mods: Control,           action: Copy             }
  - { key: F,        mods: Control|Shift,           action: SearchForward    }
  - { key: B,        mods: Control|Shift,           action: SearchBackward   }
